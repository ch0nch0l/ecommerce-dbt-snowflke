name: dbt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: compile ────────────────────────────────────────────────────────
  # Always runs — no Snowflake credentials needed.
  # dbt compile only parses SQL and resolves ref() calls locally.
  # Uses hardcoded placeholder strings so dbt's type validation passes.
  compile:
    name: dbt compile (syntax check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-dbt-${{ hashFiles('requirements.txt') }}

      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write dummy profiles.yml
        # compile never connects to Snowflake — placeholder strings are fine.
        # All values must be non-empty strings to pass dbt's type validation.
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ecommerce_analytics:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "dummy_account"
                user: "dummy_user"
                password: "dummy_password"
                role: "SYSADMIN"
                database: "ECOMMERCE_DEV"
                warehouse: "COMPUTE_WH"
                schema: "dbt_ci"
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt compile
        # Validates all SQL syntax and ref() resolution — no DB connection made.
        run: dbt compile --target ci

  # ── Job 2: run + test ─────────────────────────────────────────────────────
  # Only runs when SNOWFLAKE_ACCOUNT secret is set in the repo.
  # Add secrets at: GitHub repo → Settings → Secrets → Actions
  # Required secrets: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PASSWORD,
  #                   SNOWFLAKE_ROLE
  run-and-test:
    name: dbt run + test (requires Snowflake secrets)
    runs-on: ubuntu-latest
    needs: compile                         # only runs if compile passes
    if: ${{ secrets.SNOWFLAKE_ACCOUNT != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-dbt-${{ hashFiles('requirements.txt') }}

      - name: Install dbt
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write profiles.yml from secrets
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          ecommerce_analytics:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                database: "ECOMMERCE_DEV"
                warehouse: "COMPUTE_WH"
                schema: "dbt_ci_${{ github.run_id }}"
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt seed
        run: dbt seed --target ci

      - name: dbt run
        run: dbt run --target ci

      - name: dbt test
        run: dbt test --target ci

      - name: dbt snapshot
        run: dbt snapshot --target ci

      - name: Cleanup CI schema
        if: always()
        run: |
          dbt run-operation drop_schema \
            --args "{schema: dbt_ci_${{ github.run_id }}, database: ECOMMERCE_DEV}" \
            --target ci

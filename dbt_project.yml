name: ecommerce_analytics
version: "1.0.0"
config-version: 2

# Profile connects to Snowflake — defined in ~/.dbt/profiles.yml locally
# or via environment variables in CI/dbt Cloud
profile: ecommerce_analytics

# Model directory paths
model-paths:      ["models"]
snapshot-paths:   ["snapshots"]
test-paths:       ["tests"]
macro-paths:      ["macros"]
seed-paths:       ["seeds"]
analysis-paths:   ["analyses"]
docs-paths:       ["docs"]

target-path:  "target"
clean-targets: ["target", "dbt_packages"]

# ── Materialisation defaults per layer ────────────────────────────────────────
# Staging  → views   (cheap to build, always fresh from source)
# Intermediate → views (intermediate logic, not queried directly)
# Marts    → tables  (queried by BI tools — persist for performance)
models:
  ecommerce_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

snapshots:
  ecommerce_analytics:
    +target_schema: snapshots

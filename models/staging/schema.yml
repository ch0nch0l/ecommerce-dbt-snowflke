version: 2

models:
  - name: stg_orders
    description: "Cleaned and standardised orders. One row per order."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable,
                       invoiced, processing, created, approved]
      - name: ordered_at
        tests: [not_null]

  - name: stg_order_items
    description: "One row per item within an order."
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: line_total
        tests: [not_null]

  - name: stg_customers
    description: "Customer master data. customer_id is per-order; customer_unique_id is per-person."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null]
      - name: state
        tests: [not_null]

  - name: stg_products
    description: "Product catalogue with English category names."
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: product_category
        tests: [not_null]

  - name: stg_sellers
    description: "Seller master data."
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_order_payments
    description: "Payment transactions per order. Multiple rows per order possible."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: [credit_card, boleto, voucher, debit_card, not_defined]
      - name: payment_value
        tests: [not_null]

  - name: stg_order_reviews
    description: "Customer reviews. One row per review."
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: review_sentiment
        tests:
          - accepted_values:
              values: [positive, neutral, negative]

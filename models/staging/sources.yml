version: 2

sources:
  - name: olist
    description: >
      Brazilian e-commerce public dataset by Olist. Contains ~100k orders
      placed between 2016 and 2018 across multiple marketplaces in Brazil.
      Dataset: https://www.kaggle.com/datasets/olistbr/brazilian-ecommerce
    database: ECOMMERCE_RAW
    schema: OLIST
    # Freshness checks — warn if data is older than 7 days in prod
    freshness:
      warn_after: {count: 7, period: day}
      error_after: {count: 30, period: day}
    loaded_at_field: order_purchase_timestamp

    tables:
      - name: orders
        description: "One row per order. Core fact table of the dataset."
        columns:
          - name: order_id
            description: "Unique order identifier"
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: [delivered, shipped, canceled, unavailable,
                           invoiced, processing, created, approved]
          - name: order_purchase_timestamp
            tests: [not_null]

      - name: order_items
        description: "One row per item within an order. An order can have multiple items."
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: seller_id
            tests: [not_null]
          - name: price
            tests: [not_null]

      - name: customers
        description: "One row per customer. Note: customer_id is per-order, not per-person."
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: customer_unique_id
            description: "Stable identifier for a real-world customer (can have multiple orders)"
            tests: [not_null]
          - name: customer_state
            tests: [not_null]

      - name: products
        description: "Product catalogue with dimensions and category."
        columns:
          - name: product_id
            tests: [not_null, unique]

      - name: sellers
        description: "Seller master data."
        columns:
          - name: seller_id
            tests: [not_null, unique]
          - name: seller_state
            tests: [not_null]

      - name: order_reviews
        description: "Customer reviews submitted after delivery."
        columns:
          - name: review_id
            tests: [not_null]
          - name: order_id
            tests: [not_null]
          - name: review_score
            tests:
              - not_null
              - accepted_values:
                  values: [1, 2, 3, 4, 5]

      - name: order_payments
        description: "Payment transactions for each order. An order can have multiple payments."
        columns:
          - name: order_id
            tests: [not_null]
          - name: payment_type
            tests:
              - not_null
              - accepted_values:
                  values: [credit_card, boleto, voucher, debit_card, not_defined]
          - name: payment_value
            tests: [not_null]

      - name: product_category_name_translation
        description: "Maps Portuguese category names to English."
        columns:
          - name: product_category_name
            tests: [not_null, unique]
          - name: product_category_name_english
            tests: [not_null]

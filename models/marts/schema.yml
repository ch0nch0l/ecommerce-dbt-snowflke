version: 2

models:
  - name: fct_orders
    description: >
      Core order fact table. One row per order. Incremental — only processes
      new orders on each run. Primary table for all revenue reporting.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable,
                       invoiced, processing, created, approved]
      - name: ordered_at
        tests: [not_null]
      - name: order_gross_revenue
        tests: [not_null]
      - name: customer_unique_id
        description: "FK to dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_unique_id

  - name: dim_customers
    description: >
      Customer dimension with lifetime value metrics. Grain: one row per
      unique customer (customer_unique_id). Updated on each dbt run.
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null, unique]
      - name: customer_segment
        tests:
          - accepted_values:
              values: [one-time, occasional, regular, loyal]
      - name: ltv_tier
        tests:
          - accepted_values:
              values: [bronze, silver, gold, platinum]
      - name: total_orders
        tests: [not_null]
      - name: lifetime_revenue
        tests: [not_null]

  - name: dim_products
    description: "Product dimension with sales performance metrics."
    columns:
      - name: product_sk
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]
      - name: product_category
        tests: [not_null]

  - name: mart_daily_revenue
    description: >
      Daily revenue summary with 7-day rolling averages. Primary table
      for revenue dashboards and trend analysis.
    columns:
      - name: order_date
        tests: [not_null, unique]
      - name: gross_revenue
        tests: [not_null]
      - name: total_orders
        tests: [not_null]

  - name: mart_category_performance
    description: "Revenue, volume, and satisfaction by product category."
    columns:
      - name: product_category
        tests: [not_null, unique]
      - name: total_revenue
        tests: [not_null]

  - name: mart_seller_performance
    description: "Seller-level performance metrics with tiering."
    columns:
      - name: seller_sk
        tests: [not_null, unique]
      - name: seller_id
        tests: [not_null, unique]
      - name: seller_tier
        tests:
          - accepted_values:
              values: [top, standard, at-risk, inactive]

version: 2

models:
  - name: int_orders_enriched
    description: >
      Order-level dataset joining orders, customers, items, payments,
      and reviews. The central model used by all mart tables.
      Grain: one row per order.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests: [not_null]
      - name: ordered_at
        tests: [not_null]
      - name: order_gross_revenue
        tests: [not_null]
      - name: item_count
        tests: [not_null]
